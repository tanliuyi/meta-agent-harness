appId: com.meta-agent.desktop
productName: Meta Agent
directories:
  buildResources: build
files:
  - out/**
  - package.json
  - resources/icon.*
  - resources/*.svg
  - node_modules/@mariozechner/clipboard/**
  - node_modules/@mariozechner/clipboard-*/**
  - '!resources/pi-coding-agent/**'
asarUnpack:
  - node_modules/@mariozechner/clipboard-*/**
  - out/main/coding-agent-node-sidecar-worker.js
  - out/main/chunks/**
  - resources/icon.*
  - resources/*.svg
extraResources:
  - from: resources/pi-coding-agent
    to: pi-coding-agent
win:
  executableName: Meta Agent
  icon: resources/icon.ico
nsis:
  artifactName: meta-agent-desktop-${version}-setup.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  icon: resources/icon.png
  artifactName: meta-agent-desktop-${version}-${arch}.${ext}
  target:
    - dmg
    - zip
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
dmg:
  artifactName: meta-agent-desktop-${version}-${arch}.${ext}
linux:
  icon: resources/icon.png
  executableName: meta-agent-desktop
  artifactName: meta-agent-desktop-${version}-${arch}.${ext}
  target:
    - AppImage
    - snap
    - deb
  maintainer: Meta Agent
  category: Utility
appImage:
  artifactName: meta-agent-desktop-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: tanliuyi
  repo: meta-agent-harness
  releaseType: release
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
