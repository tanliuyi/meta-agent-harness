<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Meta Agent</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'nonce-theme-init'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <script nonce="theme-init">
      ;(() => {
        try {
          const storageKey = 'meta-agent.theme'
          const storedTheme = window.localStorage.getItem(storageKey)
          const themeMode =
            storedTheme === 'light' || storedTheme === 'dark' || storedTheme === 'system'
              ? storedTheme
              : 'system'
          const resolvedTheme =
            themeMode === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : themeMode

          document.documentElement.dataset.themeMode = themeMode
          document.documentElement.dataset.theme = resolvedTheme
          document.documentElement.style.colorScheme = resolvedTheme

          const uiFontSize = Number(window.localStorage.getItem('meta-agent.ui-font-size'))
          const codeFontSize = Number(window.localStorage.getItem('meta-agent.code-font-size'))
          const normalizedUiFontSize = Number.isFinite(uiFontSize)
            ? Math.min(16, Math.max(11, Math.round(uiFontSize)))
            : 14
          const normalizedCodeFontSize = Number.isFinite(codeFontSize)
            ? Math.min(18, Math.max(11, Math.round(codeFontSize)))
            : 13

          document.documentElement.style.setProperty('--font-size-ui', `${normalizedUiFontSize}px`)
          document.documentElement.style.setProperty(
            '--font-size-ui-2xs',
            `${normalizedUiFontSize - 3}px`
          )
          document.documentElement.style.setProperty(
            '--font-size-ui-xs',
            `${normalizedUiFontSize - 2}px`
          )
          document.documentElement.style.setProperty(
            '--font-size-ui-sm',
            `${normalizedUiFontSize - 1}px`
          )
          document.documentElement.style.setProperty(
            '--font-size-ui-lg',
            `${normalizedUiFontSize + 2}px`
          )
          document.documentElement.style.setProperty(
            '--font-size-ui-xl',
            `${normalizedUiFontSize + 7}px`
          )
          document.documentElement.style.setProperty(
            '--font-size-ui-2xl',
            `${normalizedUiFontSize + 9}px`
          )
          document.documentElement.style.setProperty(
            '--font-size-code',
            `${normalizedCodeFontSize}px`
          )
        } catch {
          document.documentElement.dataset.theme = 'dark'
          document.documentElement.style.colorScheme = 'dark'
        }
      })()
    </script>
    <link
      rel="preload"
      href="/src/assets/fonts/SourceHanSansSC-VF.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/src/assets/fonts/JetBrainsMono-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
