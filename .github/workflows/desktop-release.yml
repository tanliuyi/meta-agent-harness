name: Desktop Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed release tag
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: x64
            os: windows-latest
            builder_args: --win --x64
            update_channel: latest
          - platform: macos
            arch: x64
            os: macos-latest
            builder_args: --mac --x64
            update_channel: latest
          - platform: macos
            arch: arm64
            os: macos-latest
            builder_args: --mac --arm64
            update_channel: latest-arm64
          - platform: linux
            arch: x64
            os: ubuntu-latest
            builder_args: --linux --x64
            update_channel: latest

    env:
      MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v1.2.3" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Prepare optional code-signing credentials
        if: matrix.platform != 'linux'
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos" ]; then
            if [ -n "$MAC_CSC_LINK" ]; then
              echo "CSC_LINK=$MAC_CSC_LINK" >> "$GITHUB_ENV"
              echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD" >> "$GITHUB_ENV"
            else
              echo "MAC_IDENTITY_ARG=-c.mac.identity=-" >> "$GITHUB_ENV"
            fi
          elif [ "${{ matrix.platform }}" = "windows" ] && [ -n "$WIN_CSC_LINK" ]; then
            echo "CSC_LINK=$WIN_CSC_LINK" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=$WIN_CSC_KEY_PASSWORD" >> "$GITHUB_ENV"
          fi

      - name: Prepare Apple notarization key
        if: >-
          matrix.platform == 'macos' &&
          env.APPLE_API_KEY_BASE64 != '' &&
          env.APPLE_API_KEY_ID != '' &&
          env.APPLE_API_ISSUER != ''
        shell: bash
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm --filter @meta-agent/desktop build

      - name: Package release
        shell: bash
        run: >-
          pnpm --filter @meta-agent/desktop exec electron-builder
          ${{ matrix.builder_args }}
          --publish never
          -c.extraMetadata.version=${{ steps.release.outputs.version }}
          -c.publish.channel=${{ matrix.update_channel }}
          ${MAC_IDENTITY_ARG:-}

      - name: Collect release assets
        shell: bash
        run: |
          mkdir release-assets
          find apps/desktop/dist -maxdepth 1 -type f \
            \( -name '*.exe' -o -name '*.dmg' -o -name '*.zip' -o -name '*.AppImage' \
            -o -name '*.deb' -o -name '*.snap' -o -name '*.blockmap' -o -name 'latest*.yml' \) \
            -exec cp {} release-assets/ \;
          test -n "$(find release-assets -type f -print -quit)"

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
