<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./panel.css" />
    <title>目标</title>
  </head>
  <body>
    <main class="goal-shell">
      <header class="goal-header">
        <div class="title-group">
          <h1>目标</h1>
          <div
            id="status"
            class="status-badge"
            data-status="empty"
            role="status"
            aria-live="polite"
          >
            <span class="status-dot" aria-hidden="true"></span>
            <span id="status-text">暂无目标</span>
          </div>
        </div>
        <button
          id="refresh"
          class="icon-button"
          type="button"
          title="刷新目标状态"
          aria-label="刷新目标状态"
        >
          <span aria-hidden="true">&#8635;</span>
        </button>
      </header>

      <section id="empty" class="empty-state" aria-labelledby="empty-title">
        <div class="empty-icon" aria-hidden="true">+</div>
        <div>
          <h2 id="empty-title">暂无进行中的目标</h2>
          <p>为当前会话设定一个明确目标。</p>
        </div>
        <button id="start-empty" class="primary-button" type="button">新建目标</button>
      </section>

      <section id="details" class="goal-details" hidden>
        <section class="objective-section" aria-labelledby="objective-label">
          <div class="section-heading">
            <h2 id="objective-label">当前目标</h2>
            <button id="edit" class="text-button" type="button">编辑</button>
          </div>
          <p id="objective"></p>
        </section>

        <dl class="metrics">
          <div>
            <dt>执行轮次</dt>
            <dd id="metric-iteration">-</dd>
          </div>
          <div>
            <dt>已用时间</dt>
            <dd id="metric-elapsed">-</dd>
          </div>
          <div class="token-metric">
            <dt>Token 用量</dt>
            <dd id="metric-tokens">-</dd>
            <div
              id="token-progress"
              class="progress-track"
              role="progressbar"
              aria-label="Token 预算使用进度"
              hidden
            >
              <span id="token-progress-fill"></span>
            </div>
          </div>
        </dl>

        <p id="activity" class="activity" role="status" aria-live="polite" hidden></p>
      </section>

      <footer class="actions">
        <button id="start" class="secondary-action" type="button">新建目标</button>
        <div class="goal-actions">
          <button id="pause" class="primary-button" type="button">暂停</button>
          <button id="resume" class="primary-button" type="button">继续</button>
          <button id="clear" class="danger-button" type="button">清除</button>
        </div>
      </footer>
    </main>
    <script src="./panel.js"></script>
  </body>
</html>
